model:
  path: models/yolo11x.pt
  confidence: 0.25
  iou: 0.7
  image_size: 640
  device: cuda

runtime:
  mode: scene
  log_level: INFO

tracker:
  config_path: botsort.yaml
  persist: true
  parameters:
    tracker_type: botsort
    track_high_thresh: 0.25
    track_low_thresh: 0.1
    new_track_thresh: 0.25
    track_buffer: 60
    match_thresh: 0.8
    fuse_score: true
    gmc_method: sparseOptFlow
    proximity_thresh: 0.5
    appearance_thresh: 0.8
    with_reid: false
    model: auto

classes:
  filter:
    - person
    - car
    - bus
    - truck
    - motorcycle
    - bicycle

trajectory:
  max_history: 500

visualization:
  enabled: false
  window_name: YOLO11x BoT-SORT Tracking
  box_thickness: 2
  trajectory_thickness: 2
  font_scale: 0.55

video_output:
  enabled: true
  path: null
  codec: mp4v

export:
  enabled: true
  output_dir: outputs
  json_name: tracks.json
  csv_name: tracks.csv

scene:
  annotated_name: annotated.mp4
  scene_map_name: scene_map.mp4
  scene_tracks_json: scene_tracks.json
  scene_tracks_csv: scene_tracks.csv
  camera_motion_json: camera_motion.json
  map_width: 1000
  map_height: 1000
  map_scale: 180.0
  depth_model: depth-anything/Depth-Anything-V2-Small-hf
  cotracker_grid_size: 10
  cotracker_resize_width: 384
  cotracker_chunk_size: 120
